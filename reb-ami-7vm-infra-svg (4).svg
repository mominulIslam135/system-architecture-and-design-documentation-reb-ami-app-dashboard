<svg width="100%" viewBox="0 0 680 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="680" height="650" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="340" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#2c2c2a">REB AMI — 6 VM Infrastructure (Reporting App)</text>
  <text x="340" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#5f5e5a">5 lakh customers | 2 lakh mobile users | Read from Oracle</text>
  
  <!-- Users -->
  <rect x="220" y="60" width="240" height="36" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="82" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#0C447C">Users (Web + Mobile App)</text>
  
  <line x1="340" y1="96" x2="340" y2="120" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- DMZ Zone -->
  <rect x="30" y="125" width="620" height="70" rx="10" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="50" y="143" font-family="system-ui, sans-serif" font-size="12" fill="#E24B4A">DMZ (10.0.1.0/24)</text>
  
  <!-- VM1: Load Balancer -->
  <rect x="200" y="150" width="280" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="270" y="172" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#085041">VM1: LB-VM-01</text>
  <text x="420" y="172" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#0F6E56">4 vCPU | 8 GB</text>
  
  <!-- Application Zone -->
  <rect x="30" y="205" width="620" height="100" rx="10" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="50" y="223" font-family="system-ui, sans-serif" font-size="12" fill="#534AB7">Application tier (10.0.2.0/24)</text>
  
  <!-- Arrows from LB to App servers -->
  <path d="M280 186 L280 210 L150 210 L150 240" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M340 186 L340 240" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M400 186 L400 210 L530 210 L530 240" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- VM2: App Server 1 -->
  <rect x="55" y="245" width="190" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="150" y="263" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#3C3489">VM2: APP-VM-01</text>
  <text x="150" y="283" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#534AB7">Node.js | 4 vCPU | 8 GB</text>
  
  <!-- VM3: App Server 2 -->
  <rect x="255" y="245" width="190" height="50" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="350" y="263" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#3C3489">VM3: APP-VM-02</text>
  <text x="350" y="283" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#534AB7">Node.js | 4 vCPU | 8 GB</text>
  
  <!-- VM4: Web Dashboard -->
  <rect x="455" y="245" width="180" height="50" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="545" y="263" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#712B13">VM4: WEB-VM-01</text>
  <text x="545" y="283" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#993C1D">Vue.js | 2 vCPU | 4 GB</text>
  
  <!-- Data Zone -->
  <rect x="30" y="320" width="620" height="95" rx="10" fill="none" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="50" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#0F6E56">Data tier (10.0.3.0/24)</text>
  
  <!-- Arrows to Data tier -->
  <line x1="150" y1="295" x2="150" y2="315" stroke="#5f5e5a" stroke-width="1"/>
  <line x1="350" y1="295" x2="350" y2="315" stroke="#5f5e5a" stroke-width="1"/>
  <line x1="150" y1="315" x2="350" y2="315" stroke="#5f5e5a" stroke-width="1"/>
  <path d="M250 315 L250 350" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- VM5: PostgreSQL Primary -->
  <rect x="120" y="355" width="200" height="50" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="220" y="373" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#27500A">VM5: DB-VM-01</text>
  <text x="220" y="393" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#3B6D11">PostgreSQL | 4 vCPU | 16 GB</text>
  
  <!-- VM6: PostgreSQL Replica -->
  <rect x="360" y="355" width="200" height="50" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="460" y="373" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#27500A">VM6: DB-VM-02</text>
  <text x="460" y="393" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="12" fill="#3B6D11">PostgreSQL | 4 vCPU | 16 GB</text>
  
  <!-- Replication arrow -->
  <line x1="320" y1="380" x2="358" y2="380" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="339" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0F6E56">Sync</text>
  
  <!-- External Oracle -->
  <rect x="150" y="430" width="380" height="55" rx="10" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="170" y="448" font-family="system-ui, sans-serif" font-size="12" fill="#BA7517">External (REB IT Managed)</text>
  
  <rect x="220" y="455" width="240" height="24" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="471" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#444441">Oracle Database (Read Only)</text>
  
  <!-- Arrow from App to Oracle -->
  <path d="M220 405 L220 430 L340 430 L340 453" fill="none" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="280" y="442" font-family="system-ui, sans-serif" font-size="11" fill="#BA7517">Read queries</text>
  
  <!-- Summary Table -->
  <rect x="40" y="500" width="600" height="135" rx="10" fill="#F8F7F5" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <text x="60" y="523" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">Infrastructure summary (6 VMs) — On-premise Data Center</text>
  
  <!-- Table headers -->
  <text x="60" y="550" font-family="system-ui, sans-serif" font-size="12" fill="#5f5e5a">VM</text>
  <text x="180" y="550" font-family="system-ui, sans-serif" font-size="12" fill="#5f5e5a">Role</text>
  <text x="380" y="550" font-family="system-ui, sans-serif" font-size="12" fill="#5f5e5a">vCPU</text>
  <text x="460" y="550" font-family="system-ui, sans-serif" font-size="12" fill="#5f5e5a">RAM</text>
  <text x="550" y="550" font-family="system-ui, sans-serif" font-size="12" fill="#5f5e5a">Storage</text>
  
  <line x1="50" y1="558" x2="630" y2="558" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Table rows -->
  <text x="60" y="578" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">VM1-4</text>
  <text x="180" y="578" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">LB + App + Web</text>
  <text x="380" y="578" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">14</text>
  <text x="460" y="578" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">28 GB</text>
  <text x="550" y="578" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">240 GB</text>
  
  <text x="60" y="598" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">VM5-6</text>
  <text x="180" y="598" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">PostgreSQL (Primary + Replica)</text>
  <text x="380" y="598" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">8</text>
  <text x="460" y="598" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">32 GB</text>
  <text x="550" y="598" font-family="system-ui, sans-serif" font-size="12" fill="#2c2c2a">300 GB</text>
  
  <line x1="50" y1="608" x2="630" y2="608" stroke="#D3D1C7" stroke-width="0.5"/>
  
  <!-- Totals -->
  <text x="60" y="628" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">TOTAL</text>
  <text x="180" y="628" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">6 VMs</text>
  <text x="380" y="628" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">22 cores</text>
  <text x="460" y="628" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">60 GB</text>
  <text x="550" y="628" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#2c2c2a">540 GB</text>
</svg>